.vr{background:var(--red3);border:1.5px solid rgba(155,34,38,0.15)}.vr .vl,.vr .vd{color:var(--red)}

.rt{width:100%;border-collapse:collapse;font-size:12px}
.rt th{font-family:var(--mono);font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--ink4);padding:10px 12px;text-align:left;border-bottom:1.5px solid var(--bg3);font-weight:500}
.rt td{padding:10px 12px;border-bottom:1px solid var(--bg2);color:var(--ink2)}
.rt .n{font-family:var(--mono);font-weight:500}
.rt tr:last-child td{border-bottom:none}
.rt tr:hover td{background:var(--bg2)}
.ft{margin-top:48px;padding-top:24px;border-top:1px solid var(--bg3);text-align:center}
.ft p{font-size:11px;color:var(--ink5);line-height:1.7}
.ft .sg{font-family:var(--mono);font-size:9px;color:var(--ink5);margin-top:8px;letter-spacing:2px;text-transform:uppercase}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--ink);color:var(--gold2);padding:10px 20px;border-radius:8px;font-size:13px;font-weight:500;z-index:100;animation:slideUp 0.3s var(--ease);pointer-events:none}
